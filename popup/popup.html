<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Site to Markdown</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo-container">
        <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <h1>Site-to-MD</h1>
      </div>
      <span class="version-tag">v1.0.0</span>
    </header>

    <main class="app-content">
      <!-- Error Banner -->
      <div id="error-banner" class="error-banner" style="display: none;"></div>

      <!-- Settings Card -->
      <div class="card settings-card">
        <h2>Configuration</h2>
        
        <!-- Toggle: Single/Multi File Mode -->
        <div class="form-group row">
          <label for="mode-toggle" class="form-label">
            Multi-file (ZIP)
            <span class="label-desc">Split into chunks</span>
          </label>
          <label class="switch">
            <input type="checkbox" id="mode-toggle">
            <span class="slider round"></span>
          </label>
        </div>

        <!-- Slider: Character Count Limit -->
        <div class="form-group" id="limit-group">
          <div class="group-header">
            <label for="limit-input" class="form-label">Chunk Character Limit</label>
            <span id="limit-value" class="value-display">4000</span>
          </div>
          <input type="range" id="limit-input" min="1000" max="20000" step="500" value="4000">
        </div>

        <!-- Slider: Deduplication Sensitivity -->
        <div class="form-group">
          <div class="group-header">
            <label for="threshold-input" class="form-label">Deduplication Threshold</label>
            <span id="threshold-value" class="value-display">85%</span>
          </div>
          <input type="range" id="threshold-input" min="0.5" max="1.0" step="0.05" value="0.85">
        </div>
      </div>

      <!-- LLM Configuration Card -->
      <div class="card settings-card">
        <div class="form-group row">
          <label for="llm-toggle" class="form-label">
            Enable LLM Refinement
            <span class="label-desc">Refine markdown using AI</span>
          </label>
          <label class="switch">
            <input type="checkbox" id="llm-toggle">
            <span class="slider round"></span>
          </label>
        </div>

        <div id="llm-settings-panel" style="display: none; flex-direction: column; gap: 12px; margin-top: 8px;">
          <!-- Provider -->
          <div class="form-group">
            <label for="llm-provider" class="form-label">AI Provider</label>
            <select id="llm-provider" class="form-select">
              <option value="gemini">Google Gemini</option>
              <option value="openai">OpenAI</option>
              <option value="anthropic">Anthropic Claude</option>
              <option value="ollama">Ollama (Local)</option>
            </select>
          </div>

          <!-- API Key -->
          <div class="form-group" id="api-key-group">
            <label for="llm-key" class="form-label">API Key</label>
            <input type="password" id="llm-key" class="form-input" placeholder="Enter API Key">
          </div>

          <!-- Model Name -->
          <div class="form-group">
            <label for="llm-model" class="form-label">Model Name</label>
            <input type="text" id="llm-model" class="form-input" placeholder="e.g. gemini-1.5-flash">
          </div>

          <!-- Custom Endpoint -->
          <div class="form-group" id="endpoint-group">
            <label for="llm-endpoint" class="form-label">Custom Endpoint URL</label>
            <input type="text" id="llm-endpoint" class="form-input" placeholder="e.g. http://localhost:11434">
          </div>

          <!-- Auto-Refine Toggle -->
          <div class="form-group row">
            <label for="auto-refine-toggle" class="form-label">
              Auto-Refine
              <span class="label-desc">Refine automatically on extract</span>
            </label>
            <label class="switch">
              <input type="checkbox" id="auto-refine-toggle">
              <span class="slider round"></span>
            </label>
          </div>

          <!-- User Objective -->
          <div class="form-group">
            <label for="llm-objective" class="form-label">Refinement Objective (Optional)</label>
            <textarea id="llm-objective" class="form-textarea" rows="2" placeholder="e.g. Summarize key points, format as tutorial..."></textarea>
          </div>

          <!-- Connection Test -->
          <div class="test-connection-container">
            <button id="test-conn-btn" class="btn btn-secondary btn-sm">Test Connection</button>
            <span id="test-conn-status" class="test-status"></span>
          </div>

          <!-- Privacy Warning Callout -->
          <div id="llm-privacy-warning" class="privacy-warning" style="display: none;">
            ⚠️ <strong>Privacy Notice:</strong> Sending page content to external AI APIs will transmit website text to third-party servers.
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="action-container">
        <div class="btn-group">
          <button id="extract-btn" class="btn btn-primary">Start Extraction</button>
          <button id="improve-btn" class="btn btn-accent" style="display: none;">Improve with LLM</button>
          <button id="scan-btn" class="btn btn-secondary">Scan Directory</button>
          <button id="cancel-btn" class="btn btn-danger" style="display: none;">Cancel</button>
        </div>
        <p id="status-msg" class="status-msg">Ready to extract</p>
      </div>

      <!-- Metadata Preview Pane -->
      <div class="card preview-card">
        <h2>Active Tab Details</h2>
        <div class="preview-info">
          <div class="info-row">
            <span class="info-label">Title:</span>
            <span id="tab-title-display" class="info-value">Loading...</span>
          </div>
          <div class="info-row">
            <span class="info-label">URL:</span>
            <span id="tab-url-display" class="info-value">Loading...</span>
          </div>
        </div>
      </div>

      <!-- Content Preview Card (US3) -->
      <div id="content-preview-card" class="card preview-card" style="display: none;">
        <h2>Extracted Markdown Preview</h2>
        <div class="tab-header">
          <button id="tab-original" class="tab-btn active">Original</button>
          <button id="tab-improved" class="tab-btn" style="display: none;">LLM Improved</button>
        </div>
        <div class="preview-content-container">
          <pre id="preview-text-box"></pre>
        </div>
        <div class="preview-actions">
          <button id="download-preview-btn" class="btn btn-primary">Download Markdown</button>
        </div>
      </div>
    </main>
  </div>
  <script src="../lib/readability.js"></script>
  <script src="../lib/turndown.js"></script>
  <script src="../lib/jszip.js"></script>
  <script src="popup.js"></script>
</body>
</html>
